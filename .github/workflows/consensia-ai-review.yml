name: Consensia AI Reviewer

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions:
  contents: write
  pull-requests: write

jobs:
  review:
    if: ${{ secrets.CONSENSIA_API_KEY != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Consensia AI Reviewer
        uses: Ashixi/consensia-action@v1.0.2
        with:
          api-key: ${{ secrets.CONSENSIA_API_KEY }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          target: pr
          mode: BALANCED
          rounds: 2

  missing-secret:
    if: ${{ secrets.CONSENSIA_API_KEY == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Skip Consensia review (CONSENSIA_API_KEY not set)
        run: |
          echo "CONSENSIA_API_KEY is not configured; skipping Consensia AI Reviewer."
