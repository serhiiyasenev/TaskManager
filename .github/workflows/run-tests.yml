name: Run Tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up .NET 10
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    - name: Restore dependencies
      run: dotnet restore TaskManager.sln

    - name: Build solution
      run: dotnet build TaskManager.sln --configuration Release --no-restore

    - name: Run tests with Coverlet
      run: |
        dotnet test TaskManager.sln \
          --settings .runsettings \
          --logger "trx;LogFileName=test_results.trx" \
          --no-build \
          --configuration Release

    - name: Publish test results
      uses: EnricoMi/publish-unit-test-result-action@v2
      if: always()
      with:
        files: '**/TestResults/**/test_results.trx'
        check_name: 'Test Results'

    - name: Install ReportGenerator
      run: dotnet tool install -g dotnet-reportgenerator-globaltool

    - name: Generate coverage report
      run: |
        reportgenerator \
          -reports:"**/TestResults/**/coverage*.*" \
          -targetdir:"CoverageReport" \
          -reporttypes:"HtmlInline_AzurePipelines;JsonSummary;Badges"

    - name: Upload coverage report as artifact
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report
        path: CoverageReport

    - name: Extract coverage percent
      id: coverage
      run: |
        value=$(jq '.summary.linecoverage' CoverageReport/Summary.json | xargs printf "%.2f")
        echo "value=$value" >> $GITHUB_OUTPUT

    - name: Add coverage comment to PR
      if: github.event_name == 'pull_request'
      uses: marocchino/sticky-pull-request-comment@v2
      with:
        message: |
          ## ✔️ Code Coverage Report
          **Line Coverage:** `${{ steps.coverage.outputs.value }}%`

          📊 [Download full report](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

    - name: Create coverage badge
      if: github.ref == 'refs/heads/main'
      uses: schneegans/dynamic-badges-action@v1.7.0
      with:
        auth: ${{ secrets.GIST_SECRET }}
        gistID: ${{ secrets.GIST_ID }}
        filename: coverage.json
        label: coverage
        message: "${{ steps.coverage.outputs.value }}%"
        valColorRange: ${{ steps.coverage.outputs.value }}
        minColorRange: 0
        maxColorRange: 100
